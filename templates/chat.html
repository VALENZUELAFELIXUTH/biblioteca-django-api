<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Biblioteca UTH</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; padding: 20px; text-align: center; }
        .chat-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        #chat-log { height: 300px; background: #f9f9f9; border-radius: 10px; padding: 15px; overflow-y: auto; border: 1px solid #eee; text-align: left; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd; outline: none; }
        button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #5568d3; }
        .btn-back { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
        .system-msg { color: #888; font-style: italic; font-size: 0.9em; margin: 5px 0; text-align: center; }
        .message { margin-bottom: 8px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>🏛️ Chat de la Biblioteca</h1>
        
        <div id="chat-log">
            </div>

        <div class="input-group">
            <input id="chat-message-input" type="text" placeholder="Escribe un mensaje..." autocomplete="off">
            <button id="chat-message-submit">Enviar</button>
        </div>
    </div>

    <a href="/" class="btn-back">← Volver al Inicio</a>

    <script>
        // 1. Obtener datos del usuario (del localStorage del Login con Google)
        const userData = JSON.parse(localStorage.getItem('user_info') || '{}');
        const username = userData.name || userData.username || 'Anónimo';

        // 2. Conectar al WebSocket
        // Asegúrate de que el nombre de la sala sea 'general' para que coincida con tu routing
        const chatSocket = new WebSocket(
            'ws://' + window.location.host + '/ws/chat/general/'
        );

        chatSocket.onopen = function(e) {
            console.log('✅ WebSocket conectado');
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            
            // Manejar mensajes de usuario o de sistema (unión/salida)
            if (data.type === 'message') {
                addMessage(data.username, data.message, false);
            } else if (data.type === 'system') {
                addMessage('Sistema', data.message, true);
            }
        };

        chatSocket.onclose = function(e) {
            console.error('❌ WebSocket cerrado');
            addMessage('Sistema', 'Conexión perdida con el servidor', true);
        };

        chatSocket.onerror = function(e) {
            console.error('⚠️ Error en WebSocket:', e);
        };

        // 3. Lógica para enviar mensajes
        const inputDom = document.querySelector('#chat-message-input');
        const submitBtn = document.querySelector('#chat-message-submit');

        inputDom.focus();
        
        // Enviar con la tecla Enter
        inputDom.onkeyup = function(e) {
            if (e.keyCode === 13) { 
                submitBtn.click(); 
            }
        };

        // Enviar al hacer clic en el botón
        submitBtn.onclick = function(e) {
            const message = inputDom.value;
            if (message.trim() !== "") {
                chatSocket.send(JSON.stringify({
                    'message': message,
                    'username': username
                }));
                inputDom.value = ''; // Limpiar input
            }
        };

        // 4. Función para agregar mensajes al cuadro visual
        function addMessage(user, message, isSystem) {
            const chatLog = document.querySelector('#chat-log');
            if (isSystem) {
                chatLog.innerHTML += `<div class="system-msg">${message}</div>`;
            } else {
                chatLog.innerHTML += `<div class="message"><strong>${user}:</strong> ${message}</div>`;
            }
            // Auto-scroll hacia abajo
            chatLog.scrollTop = chatLog.scrollHeight;
        }
    </script>
</body>
</html>
